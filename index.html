<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحاج إبراهيم - أجهزة مستعملة أصلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet\">\n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a237e;
            --primary-light: #283593;
            --secondary: #ffc107;
            --secondary-dark: #ffa000;
            --dark: #0d1b2a;
            --light: #f8f9fa;
            --gray: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --gradient: linear-gradient(135deg, #1a237e 0%, #283593 50%, #3949ab 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; color: var(--dark); overflow-x: hidden; }
        
        .header { background: var(--gradient); color: white; padding: 20px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo i { font-size: 2.4rem; color: var(--secondary); text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .logo h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; }
        .logo p { font-size: 0.85rem; color: rgba(255,255,255,0.8); margin-top: -2px; }
        
        .search-bar { flex: 0 1 500px; position: relative; margin: 0 20px; }
        .search-bar input { width: 100%; padding: 12px 50px 12px 20px; border: none; border-radius: 50px; background: rgba(255,255,255,0.15); color: white; font-family: inherit; font-size: 0.95rem; backdrop-filter: blur(5px); transition: all 0.3s ease; }
        .search-bar input::placeholder { color: rgba(255,255,255,0.6); }
        .search-bar input:focus { background: white; color: var(--dark); box-shadow: 0 0 15px rgba(255,255,255,0.3); outline: none; }
        .search-bar i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.6); font-size: 1.1rem; transition: all 0.3s ease; }
        .search-bar input:focus + i { color: var(--primary); }
        
        .nav-actions { display: flex; align-items: center; gap: 15px; }
        .action-btn { background: rgba(255,255,255,0.1); border: none; width: 45px; height: 45px; border-radius: 50px; color: white; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:hover { background: var(--secondary); color: var(--dark); transform: translateY(-2px); }
        .badge { position: absolute; top: -5px; left: -5px; background: var(--danger); color: white; font-size: 0.75rem; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--primary-light); animation: pulse 2s infinite; }
        
        .admin-toggle { background: var(--secondary) !important; color: var(--dark) !important; font-weight: bold; padding: 0 20px !important; width: auto !important; height: 45px; border-radius: 50px; display: flex; align-items: center; gap: 8px; font-size: 0.95rem; box-shadow: 0 4px 10px rgba(255,193,7,0.3); }
        .admin-toggle:hover { background: white !important; color: var(--primary) !important; box-shadow: 0 6px 15px rgba(255,255,255,0.4); }
        
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: flex; gap: 30px; }
        .content-area { flex: 1; }
        
        .categories-scroll { display: flex; gap: 15px; margin-bottom: 30px; overflow-x: auto; padding: 5px 5px 15px 5px; scrollbar-width: none; }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .category-pill { background: white; padding: 12px 24px; border-radius: 50px; display: flex; align-items: center; gap: 12px; cursor: pointer; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.04); font-weight: 600; color: var(--gray); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.05); }
        .category-pill i { font-size: 1.2rem; }
        .category-pill:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.08); color: var(--primary); }
        .category-pill.active { background: var(--primary); color: white; box-shadow: 0 8px 20px rgba(26,35,126,0.3); border-color: var(--primary); }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .section-title { font-size: 1.5rem; font-weight: 800; color: var(--dark); position: relative; padding-right: 15px; }
        .section-title::before { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 5px; height: 25px; background: var(--secondary); border-radius: 3px; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.03); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.04); cursor: pointer; position: relative; display: flex; flex-direction: column; height: 100%; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .product-image { height: 220px; background: #f8f9fa; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .product-card:hover .product-image img { transform: scale(1.08); }
        .product-image i { font-size: 4rem; color: rgba(26,35,126,0.15); }
        
        .status-badge { position: absolute; top: 15px; left: 15px; padding: 6px 14px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.15); z-index: 2; }
        .status-badge.excellent { background: var(--success); }
        .status-badge.very-good { background: #009688; }
        .status-badge.good { background: var(--secondary-dark); }
        
        .product-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-meta { font-size: 0.8rem; color: var(--gray); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; }
        .product-name { font-size: 1.1rem; font-weight: 700; color: var(--dark); margin-bottom: 12px; line-height: 1.4; height: 44px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.05); }
        .price-tag { display: flex; flex-direction: column; }
        .price-amount { font-size: 1.35rem; font-weight: 800; color: var(--primary); }
        .price-currency { font-size: 0.8rem; color: var(--gray); font-weight: 600; margin-top: -2px; }
        
        .add-to-cart-btn { background: var(--light); border: none; width: 42px; height: 42px; border-radius: 12px; color: var(--primary); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .add-to-cart-btn:hover { background: var(--primary); color: white; transform: scale(1.05); }
        
        /* Modals Panels */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(13,27,42,0.6); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .side-panel { position: fixed; top: 0; left: 0; bottom: 0; width: 450px; background: white; box-shadow: 20px 0 40px rgba(0,0,0,0.15); z-index: 1001; transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .side-panel.active { transform: translateX(0); }
        .side-panel.right-panel { left: auto; right: 0; transform: translateX(100%); box-shadow: -20px 0 40px rgba(0,0,0,0.15); }
        .side-panel.right-panel.active { transform: translateX(0); }
        
        .panel-header { padding: 25px; background: var(--light); border-bottom: 1px solid rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 1.3rem; font-weight: 800; color: var(--dark); display: flex; align-items: center; gap: 12px; }
        .panel-header h2 i { color: var(--primary); }
        .close-panel-btn { background: white; border: none; width: 36px; height: 36px; border-radius: 50%; color: var(--gray); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: all 0.2s ease; }
        .close-panel-btn:hover { background: var(--danger); color: white; transform: rotate(90deg); }
        
        .panel-content { padding: 25px; flex-grow: 1; overflow-y: auto; }
        
        /* Forms styling */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px 16px; border: 1px solid rgba(0,0,0,0.12); border-radius: 12px; font-family: inherit; font-size: 0.95rem; color: var(--dark); transition: all 0.3s ease; background: #fdfdfd; }
        .form-control:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(26,35,126,0.1); outline: none; }
        textarea.form-control { resize: vertical; min-height: 100px; }
        
        .submit-btn { width: 100%; padding: 14px; background: var(--gradient); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(26,35,126,0.2); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(26,35,126,0.3); }
        
        /* Product Detail Modal */
        .detail-modal { background: white; width: 850px; max-width: 95%; border-radius: 25px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.15); display: flex; height: 550px; transform: scale(0.9); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .modal-overlay.active .detail-modal { transform: scale(1); }
        
        .detail-image { flex: 1; background: #f8f9fa; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .detail-image img { width: 100%; height: 100%; object-fit: cover; }
        .detail-image i { font-size: 8rem; color: rgba(26,35,126,0.08); }
        
        .detail-info { flex: 1.2; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; }
        .detail-title { font-size: 1.6rem; font-weight: 800; color: var(--dark); margin-bottom: 15px; line-height: 1.3; }
        .detail-price { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin-bottom: 25px; display: flex; align-items: baseline; gap: 5px; }
        .detail-price span { font-size: 0.9rem; color: var(--gray); font-weight: 600; }
        
        .specs-list { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .spec-item { display: flex; align-items: center; gap: 12px; font-size: 0.95rem; color: #334155; background: #f8fafc; padding: 10px 15px; border-radius: 10px; border-right: 3px solid var(--secondary); }
        .spec-item i { color: var(--primary); font-size: 1.1rem; }
        
        .detail-desc { font-size: 0.95rem; color: var(--gray); line-height: 1.6; margin-bottom: 30px; }
        
        /* Cart view styling */
        .cart-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
        .cart-item-img { width: 60px; height: 60px; background: #f8f9fa; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-details { flex-grow: 1; }
        .cart-item-name { font-weight: 700; font-size: 0.95rem; color: var(--dark); margin-bottom: 4px; }
        .cart-item-price { font-weight: 800; color: var(--primary); font-size: 0.9rem; }
        .remove-item-btn { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 1.1rem; transition: color 0.2s; padding: 5px; }
        .remove-item-btn:hover { color: var(--danger); }
        
        .cart-footer { padding: 25px; background: var(--light); border-top: 1px solid rgba(0,0,0,0.06); margin-top: auto; }
        .cart-total { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: 800; color: var(--dark); margin-bottom: 20px; }
        .cart-total .total-amount { color: var(--primary); font-size: 1.5rem; }
        
        /* Toast Notification */
        .toast { position: fixed; bottom: 30px; right: 30px; background: var(--dark); color: white; padding: 15px 30px; border-radius: 15px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000; transform: translateY(100px); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast i { font-size: 1.3rem; }
        .toast.success i { color: var(--secondary); }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
        
        @media (max-width: 768px) {
            .header-container { flex-direction: column; gap: 15px; }
            .search-bar { width: 100%; margin: 10px 0; }
            .side-panel { width: 100%; }
            .detail-modal { flex-direction: column; height: auto; max-height: 90vh; }
            .detail-image { height: 200px; }
            .detail-info { padding: 25px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="toast" class="toast">
        <i class="fa-solid var(--icon)"></i>
        <span id="toastMessage">تم الإجراء بنجاح</span>
    </div>

    <header class="header">
        <div class="header-container">
            <div class="logo" onclick="showHome()">
                <i class="fa-solid fa-bolt-lightning"></i>
                <div>
                    <h1>الحاج إبراهيم</h1>
                    <p>للأجهزة الإلكترونية المستعملة والأصلية</p>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ابحث عن ثلاجة، هاتف، غسالة..." oninput="handleSearch()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            
            <div class="nav-actions">
                <button class="action-btn admin-toggle" onclick="togglePanel('adminPanel')">
                    <i class="fa-solid fa-sliders"></i>
                    <span>لوحة التحكم</span>
                </button>
                <button class="action-btn" onclick="togglePanel('cartPanel')">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <span class="badge" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <section class="content-area">
            
            <div class="categories-scroll">
                <div class="category-pill active" data-category="all" onclick="filterCategory('all', this)">
                    <i class="fa-solid fa-border-all"></i> الكل
                </div>
                <div class="category-pill" data-category="phone" onclick="filterCategory('phone', this)">
                    <i class="fa-solid fa-mobile-screen-button"></i> هواتف
                </div>
                <div class="category-pill" data-category="laptop" onclick="filterCategory('laptop', this)">
                    <i class="fa-solid fa-laptop"></i> حواسيب
                </div>
                <div class="category-pill" data-category="home_electric" onclick="filterCategory('home_electric', this)">
                    <i class="fa-solid fa-plug"></i> كهرومنزلي
                </div>
                <div class="category-pill" data-category="tv" onclick="filterCategory('tv', this)">
                    <i class="fa-solid fa-tv"></i> شاشات
                </div>
            </div>

            <div class="section-header">
                <h2 class="section-title" id="sectionTitle">جميع المنتجات المعروضة</h2>
            </div>
            
            <div class="products-grid" id="productsGrid">
                </div>
            
        </section>
    </main>

    <div id="cartPanel" class="side-panel right-panel">
        <div class="panel-header">
            <h2><i class="fa-solid fa-basket-shopping"></i> سلة المشتريات</h2>
            <button class="close-panel-btn" onclick="togglePanel('cartPanel')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="panel-content" id="cartItemsContainer">
            </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>الإجمالي:</span>
                <span class="total-amount" id="cartTotalAmount">0 د.ج</span>
            </div>
            <button class="submit-btn" onclick="checkout()"><i class="fa-solid fa-circle-check"></i> تأكيد الطلب عبر واتساب</button>
        </div>
    </div>

    <div id="adminPanel" class="side-panel">
        <div class="panel-header">
            <h2><i class="fa-solid fa-sliders"></i> إدارة المتجر</h2>
            <button class="close-panel-btn" onclick="togglePanel('adminPanel')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="panel-content">
            <form id="productForm" onsubmit="handleFormSubmit(event)">
                <div class="form-group">
                    <label>اسم المنتج *</label>
                    <input type="text" id="newProductName" class="form-control" required placeholder="مثال: غسالة LG 8kg">
                </div>
                <div class="form-group">
                    <label>الفئة *</label>
                    <select id="newProductCategory" class="form-control" required>
                        <option value="phone">هواتف</option>
                        <option value="laptop">حواسيب</option>
                        <option value="home_electric">كهرومنزلي</option>
                        <option value="tv">شاشات</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>السعر (د.ج) *</label>
                    <input type="number" id="newProductPrice" class="form-control" required placeholder="مثال: 45000">
                </div>
                <div class="form-group">
                    <label>حالة الجهاز *</label>
                    <select id="newProductStatus" class="form-control" required>
                        <option value="excellent">ممتازة (شبه جديد)</option>
                        <option value="very-good">جيدة جداً</option>
                        <option value="good">مقبولة (شغال تمام)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>صورة المنتج</label>
                    <input type="file" id="newProductImageFile" class="form-control" accept="image/*">
                </div>
                <div class="form-group">
                    <label>أيقونة احتياطية (في حال عدم رفع صورة)</label>
                    <input type="text" id="newProductIcon" class="form-control" value="fa-solid fa-box" placeholder="مثال: fa-solid fa-tv">
                </div>
                <div class="form-group">
                    <label>المواصفات الأساسية (فواصل بين كل ميزة)</label>
                    <input type="text" id="newProductSpecs" class="form-control" placeholder="مثال: 8 جيجا رام, شاشة 6.5, بطارية 5000">
                </div>
                <div class="form-group">
                    <label>وصف تفصيلي</label>
                    <textarea id="newProductDesc" class="form-control" placeholder="اكتب تفاصيل عن العيوب، مدة الاستخدام، الملحقات المتوفرة..."></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitFormBtn">
                    <i class="fa-solid fa-plus"></i> إضافة المنتج للمتجر
                </button>
            </form>
        </div>
    </div>

    <div id="productDetailModal" class="modal-overlay" onclick="closeModal('productDetailModal')">
        <div class="detail-modal" onclick="event.stopPropagation()">
            <button class="close-panel-btn" onclick="closeModal('productDetailModal')" style="position: absolute; left: 20px; top: 20px; z-index: 10;"><i class="fa-solid fa-xmark"></i></button>
            <div id="productDetailContent" style="display: flex; width: 100%; height: 100%;">
                </div>
        </div>
    </div>

    <script>
        // إعداد الاتصال بسيرفر Supabase
        const SUPABASE_URL = "https://ruvdteruqgllfkaslpzu.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dmR0ZXJ1cWdsbGZrYXNscHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU5NTM1NDcsImV4cCI6MjA2MTUzMzU0N30.K9ZIn9O1BvK7z-S5_I_7z0_jO_1H_O-jO_1H_O-jO_1"; // مفتاح الأمان الافتراضي لمشروعك
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // مصفوفات التطبيق ومخازنه المؤقتة داخل الجلسة
        let products = [];
        let cart = [];
        let currentCategory = 'all';

        // دالة جلب البيانات الحقيقية من قاعدة بيانات سوبابيز
        async function loadProductsFromSupabase() {
            try {
                console.log('🔄 جاري جلب المنتجات من Supabase...');
                const { data, error } = await _supabase
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data) {
                    // تحويل البيانات القادمة من السيرفر لتتطابق مع واجهات العرض
                    products = data.map(p => ({
                        id: p.id,
                        name: p.name,
                        category: p.category,
                        price: parseFloat(p.price),
                        status: p.status || 'excellent',
                        icon: p.icon || 'fa-solid fa-box',
                        // التأكد من جلب رابط الصورة بحروف صغيرة وشرطة سفلية تماشياً مع قاعدة البيانات
                        image_url: p.image_url || null,
                        specs: p.specs ? (Array.isArray(p.specs) ? p.specs : JSON.parse(p.specs)) : [],
                        description: p.description || ''
                    }));
                    console.log(`✅ تم تحميل ${products.length} منتج من Supabase بنجاح!`);
                    return true;
                }
            } catch (err) {
                console.error('❌ خطأ أثناء الاتصال بقاعدة البيانات:', err.message);
                return false;
            }
            return false;
        }

        // دالة تهيئة وبدء تشغيل الموقع عند التحميل وتجاوز مشاكل الريفرش
        document.addEventListener('DOMContentLoaded', async function() {
            // جلب البيانات الحقيقية مباشرة دون أي تأخير
            await loadProductsFromSupabase();
            
            // رسم وتحديث الشاشات
            renderProducts();
            updateCartCount();
        });

        // دالة رسم كروت المنتجات على الشاشة وتصفيتها
        function renderProducts(productsToRender = null) {
            const grid = document.getElementById('productsGrid');
            if (!grid) return;

            let filtered = productsToRender || products;

            // فلترة العناصر حسب الفئة المختارة بالأيقونات
            if (!productsToRender && currentCategory !== 'all') {
                filtered = products.filter(p => p.category === currentCategory);
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--gray);">
                        <i class="fa-regular fa-folder-open" style="font-size: 3.5rem; margin-bottom: 15px; display: block; color: #cbd5e1;"></i>
                        <p style="font-weight: 600;">لا توجد أجهزة متوفرة في هذه الفئة حالياً</p>
                    </div>`;
                return;
            }

            grid.innerHTML = filtered.map(product => {
                let statusText = 'ممتازة';
                if (product.status === 'very-good') statusText = 'جيدة جداً';
                if (product.status === 'good') statusText = 'مقبولة';

                return `
                    <div class="product-card" onclick="showProductDetail(${product.id})">
                        <span class="status-badge ${product.status}">${statusText}</span>
                        <div class="product-image">
                            ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}">` : `<i class="${product.icon}"></i>`}
                        </div>
                        <div class="product-info">
                            <div>
                                <div class="product-meta">${getCategoryNameAr(product.category)}</div>
                                <h3 class="product-name">${product.name}</h3>
                            </div>
                            <div class="product-footer">
                                <div class="price-tag">
                                    <span class="price-amount">${product.price.toLocaleString()}</span>
                                    <span class="price-currency">دينار جزائري</span>
                                </div>
                                <button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCart(${product.id})">
                                    <i class="fa-solid fa-cart-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // دالة تصفية المنتجات عند الضغط على الأيقونة (الفئة)
        function filterCategory(category, element = null) {
            currentCategory = category;
            
            // تغيير حالة الصنف النشط بصرياً
            document.querySelectorAll('.category-pill').forEach(pill => pill.classList.remove('active'));
            if (element) {
                element.classList.add('active');
            } else {
                const targetPill = document.querySelector(`.category-pill[data-category="${category}"]`);
                if (targetPill) targetPill.classList.add('active');
            }

            // تحديث عنوان القسم المعروض واعادة الرسم من القائمة الجديدة السيرفرية
            const titles = { 'all': 'جميع المنتجات المعروضة', 'phone': 'الهواتف المتوفرة', 'laptop': 'الحواسيب المحمولة', 'home_electric': 'الأجهزة الكهرومنزلية', 'tv': 'الشاشات وأجهزة العرض' };
            document.getElementById('sectionTitle').textContent = titles[category] || 'المنتجات';
            
            renderProducts();
        }

        // دالة البحث المباشر في المنتجات
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                renderProducts();
                return;
            }

            const searchResults = products.filter(p => 
                p.name.toLowerCase().includes(query) || 
                (p.description && p.description.toLowerCase().includes(query)) ||
                getCategoryNameAr(p.category).includes(query)
            );

            renderProducts(searchResults);
        }

        // دالة إظهار نافذة تفاصيل المنتج عند الضغط على الكارت
        function showProductDetail(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            const contentContainer = document.getElementById('productDetailContent');
            let statusText = 'ممتازة (شبه جديد)';
            if (product.status === 'very-good') statusText = 'جيدة جداً';
            if (product.status === 'good') statusText = 'مقبولة (شغال تمام)';

            contentContainer.innerHTML = `
                <div class="detail-image">
                    ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}">` : `<i class="${product.icon}"></i>`}
                </div>
                <div class="detail-info">
                    <div class="product-meta" style="font-size:0.9rem; margin-bottom:10px;">${getCategoryNameAr(product.category)} | حالة الجهاز: <span style="font-weight:bold; color:var(--primary);">${statusText}</span></div>
                    <h2 class="detail-title">${product.name}</h2>
                    <div class="detail-price">${product.price.toLocaleString()} <span>د.ج</span></div>
                    
                    <h4 style="font-weight: 800; margin-bottom: 5px;">المواصفات التقنية:</h4>
                    <div class="specs-list">
                        ${product.specs.length > 0 ? product.specs.map(s => `<div class="spec-item"><i class="fa-solid fa-circle-info"></i> <span>${s}</span></div>`).join('') : '<p style="color:var(--gray); font-size:0.9rem;">لم يتم إدخال مواصفات محددة</p>'}
                    </div>

                    <h4 style="font-weight: 800; margin-top: 15px; margin-bottom: 5px;">وصف وتفاصيل الجهاز:</h4>
                    <p class="detail-desc">${product.description || 'لا يوجد وصف إضافي متوفر لهذا الجهاز.'}</p>
                    
                    <button class="submit-btn" style="margin-top:auto;" onclick="addToCart(${product.id}); closeModal('productDetailModal');">
                        <i class="fa-solid fa-cart-plus"></i> إضافة إلى سلة الشراء
                    </button>
                </div>
            `;

            document.getElementById('productDetailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // دالة معالجة إضافة وإرسال المنتجات الجديدة من لوحة التحكم
        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitFormBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري الحفظ والرفع...`;

            try {
                const name = document.getElementById('newProductName').value.trim();
                const category = document.getElementById('newProductCategory').value;
                const price = document.getElementById('newProductPrice').value;
                const status = document.getElementById('newProductStatus').value;
                const icon = document.getElementById('newProductIcon').value;
                const specsInput = document.getElementById('newProductSpecs').value;
                const description = document.getElementById('newProductDesc').value.trim();
                
                const imageFile = document.getElementById('newProductImageFile').files[0];
                let uploadedImageUrl = null;

                // 1. رفع الصورة إلى الـ Storage في حال اختيارها
                if (imageFile) {
                    const fileExt = imageFile.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                    const filePath = `products/${fileName}`;

                    const { data: uploadData, error: uploadError } = await _supabase.storage
                        .from('product-images')
                        .upload(filePath, imageFile);

                    if (uploadError) throw uploadError;

                    const { data: urlData } = _supabase.storage
                        .from('product-images')
                        .getPublicUrl(filePath);
                    
                    uploadedImageUrl = urlData.publicUrl;
                }

                // معالجة مصفوفة المواصفات
                const specs = specsInput ? specsInput.split(',').map(s => s.trim()).filter(s => s) : [];

                // 2. إدخال السطر البرميجي الجديد لجدول قاعدة البيانات
                const { data, error } = await _supabase
                    .from('products')
                    .insert([{
                        name, category, price: parseFloat(price), status, icon,
                        image_url: uploadedImageUrl,
                        specs, description
                    }])
                    .select();

                if (error) throw error;

                showToast('🚀 تم إضافة المنتج بنجاح وتأمينه على السيرفر!');
                document.getElementById('productForm').reset();
                togglePanel('adminPanel');
                
                // إعادة الجلب التلقائي الفوري لتثبيت المنتج ومنع اختفائه بالـ Refresh
                await loadProductsFromSupabase();
                renderProducts();

            } catch (err) {
                console.error(err);
                showToast('❌ واجهنا مشكلة في رفع البيانات: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-plus"></i> إضافة المنتج للمتجر`;
            }
        }

        // دالة إضافة عنصر إلى سلة الشراء المحلية المؤقتة
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            cart.push(product);
            updateCartCount();
            renderCartItems();
            showToast(`🛒 أضيف "${product.name}" بنجاح لسلتك`);
        }

        // دالة مسح عنصر من السلة
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartCount();
            renderCartItems();
        }

        // تحديث أرقام وإشعارات السلة
        function updateCartCount() {
            document.getElementById('cartCount').textContent = cart.length;
        }

        // رسم محتويات السلة وحساب الإجمالي د.ج
        function renderCartItems() {
            const container = document.getElementById('cartItemsContainer');
            const totalElement = document.getElementById('cartTotalAmount');
            
            if (cart.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:var(--gray); padding:40px 0;">السلة فارغة تماماً، تصفح واشترِ الآن!</p>`;
                totalElement.textContent = '0 د.ج';
                return;
            }

            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="cart-item">
                        <div class="cart-item-img">
                            ${item.image_url ? `<img src="${item.image_url}" alt="${item.name}">` : `<i class="${item.icon}"></i>`}
                        </div>
                        <div class="cart-item-details">
                            <h4 class="cart-item-name">${item.name}</h4>
                            <span class="cart-item-price">${item.price.toLocaleString()} د.ج</span>
                        </div>
                        <button class="remove-item-btn" onclick="removeFromCart(${index})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
            }).join('');

            totalElement.textContent = total.toLocaleString() + ' د.ج';
        }

        // إتمام الشراء وتصدير الفاتورة لـ WhatsApp الحاج إبراهيم
        function checkout() {
            if (cart.length === 0) {
                showToast('⚠️ سلّتك فارغة! أضف أجهزة لتأكيد الطلب.', 'error');
                return;
            }

            const phoneNumber = "213699254811"; // رقم هاتف المتجر
            let message = `السلام عليكم ورحمة الله، أريد طلب الأجهزة التالية من متجر الحاج إبراهيم:\n\n`;
            
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                message += `${index + 1}) ${item.name} - السعر: ${item.price.toLocaleString()} د.ج\n`;
            });

            message += `\n💰 الإجمالي الكلي: ${total.toLocaleString()} دينار جزائري.\n\nيرجى التواصل معي لتأكيد طريقة الاستلام وشحن الأجهزة.`;
            
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            
            // تصفير السلة بعد إرسال الطلب
            cart = [];
            updateCartCount();
            renderCartItems();
            togglePanel('cartPanel');
        }

        // دوال التحكم بالواجهات المنبثقة والجانبية (Side Panels)
        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            if (panel) panel.classList.toggle('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            document.body.style.overflow = '';
        }

        // دالة مساعدة لتعريب أسماء الأصناف
        function getCategoryNameAr(cat) {
            const map = { 'phone': 'هواتف محتارة', 'laptop': 'حواسيب وأجهزة لوحية', 'home_electric': 'كهرومنزلي وآلات', 'tv': 'شاشات وأجهزة عرض' };
            return map[cat] || 'أجهزة عامة';
        }

        // إشعار اللوحة العائمة المستعمل للتنبيهات
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.className = 'toast show ' + (type === 'error' ? '' : 'success');
            setTimeout(() => { toast.classList.remove('show'); }, 4000);
        }

        function showHome() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            filterCategory('all');
        }
    </script>
</body>
</html>
